<!-- BEGIN login_information -->
<div class="small">{TXT_LOGIN_INFORMATION}</div>
<!-- END login_information -->

<div>
    <!-- BEGIN login_page_editor -->
    {LPE}
    <!-- END login_page_editor -->
</div>

<div class="ilStartupSection" id="luhLogin">
    <div class="index_main">
        <nav id="LUHLoginMask">
            <div class="luh-login-grid">

                <!-- LEFT column: login options -->
                <section class="luh-col luh-col-main">
                    <h2 class="luh-uni-title">Leibniz Universität Hannover</h2>

                    <!-- WebSSO login. ILIAS injects the WebSSO login form at the placeholder
                         below; it carries both the "Login mit WebSSO" link and its "für
                         Angehörige der LUH" subtitle (see tpl.login_form_shibboleth.html), so
                         both appear only when Shibboleth/WebSSO is active. NOTE: do not write
                         the placeholder's {…} token inside an HTML comment — ILIAS expands it
                         even there, and the injected markup breaks the comment. -->
                    <div class="luh-login-option" id="shib-form-login-mask">
                        {SHIB_LOGIN_FORM}
                    </div>

                    <!-- ILIAS login (ohne WebSSO) — toggles the username/password form -->
                    <div class="luh-login-option" id="ilias_login">
                        <a class="luh-login-action"
                           data-scroll-focus="#username"
                           data-scroll-to="#login_form_footer"
                           href="#"
                           id="ilias_login_link"
                           aria-expanded="false"
                           aria-controls="login_form_footer">Login ohne WebSSO</a>
                        <p class="luh-login-desc">für Personen ohne LUH-ID, Gasthörende, Gäste und Administrierende</p>
                    </div>
                </section>

                <!-- vertical divider -->
                <div class="luh-vdivider" aria-hidden="true"></div>

                <!-- RIGHT column: Hinweise -->
                <section class="luh-col luh-col-hints">
                    <h2 class="luh-hints-title">Hinweise</h2>
                    <a class="luh-hint-btn"
                       href="https://ilias.uni-hannover.de/goto.php?target=copa_52802&amp;client_id=ilias"
                       target="_blank" rel="noopener noreferrer"
                       title="Öffnet in neuem Tab"
                       aria-label="Erstanmeldung (öffnet in neuem Tab)">Erstanmeldung</a>
                    <a class="luh-hint-btn"
                       href="https://www.zqs.uni-hannover.de/de/elsa/tools/ilias/ilias-systeme-login/"
                       target="_blank" rel="noopener noreferrer"
                       title="Öffnet in neuem Tab"
                       aria-label="Hinweise zum Login (öffnet in neuem Tab)">Hinweise zum Login</a>
                    <a class="luh-hint-btn"
                       href="register.php"
                       rel="noopener noreferrer">Selbstregistrierung</a>
                </section>

            </div>
        </nav>

        <!-- ILIAS login form — hidden until "Login ohne WebSSO" is clicked -->
        <div id="login_form_footer" hidden>
            <p id="not-websso-warning">
                <span class="glyphicon glyphicon-warning-sign luh-warning-icon" aria-hidden="true"></span>
                Nicht für die WebSSO-Anmeldung
            </p>
            <div>{REG_PWD_CLIENT_LINKS}</div>
            <p id="footer_ilias_login">{LOGIN_FORM}</p>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    document.addEventListener('DOMContentLoaded', function () {
        var loginHidden = true;
        var triggers = document.querySelectorAll('[data-scroll-to]');
        var footer = document.getElementById('login_form_footer');
        var luhLogin = document.getElementById('luhLogin');
        var loginLink = document.getElementById('ilias_login_link');

        if (!footer || !luhLogin) { return; }

        triggers.forEach(function (trigger) {
            trigger.addEventListener('click', function (e) {
                e.preventDefault();

                loginHidden = !loginHidden;

                if (!loginHidden) {
                    footer.removeAttribute('hidden');
                    luhLogin.classList.add('expanded');
                    if (loginLink) { loginLink.setAttribute('aria-expanded', 'true'); }

                    var focusTarget = document.querySelector(trigger.dataset.scrollFocus);
                    if (focusTarget) {
                        setTimeout(function () { focusTarget.focus(); }, 50);
                    }
                } else {
                    footer.setAttribute('hidden', '');
                    luhLogin.classList.remove('expanded');
                    if (loginLink) { loginLink.setAttribute('aria-expanded', 'false'); }
                }
            });
        });
    });
}());
</script>
