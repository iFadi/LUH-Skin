name: Release

# Publish a GitHub Release whenever a version tag is pushed, using the matching
# section of CHANGELOG.md as the release notes. This replaces the manual "create a
# Release" step, so a pushed tag can never again drift from the Releases page.
#
#   git tag -a v2.1.2 -m "v2.1.2" && git push origin v2.1.2
#
# The tag name must match a "## [x.y.z]" heading in CHANGELOG.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"   # v2.1.2 -> 2.1.2
          echo "Extracting notes for $version"
          # Print lines from "## [<version>]" up to (but not including) the next "## [".
          notes="$(awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") { grab=1; next }
            grab && /^## \[/           { exit }
            grab                       { print }
          ' CHANGELOG.md)"
          if [ -z "${notes//[[:space:]]/}" ]; then
            echo "::error::No CHANGELOG section found for version $version (expected a '## [$version]' heading)."
            exit 1
          fi
          {
            echo "body<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.notes.outputs.body }}" \
            --verify-tag
